<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="./src/formReport.css">
  <title>Zona de reporte</title>
</head>

<body>

  <body>
    <div class="header">
      <h1>FORMULARIO DE REPORTE</h1>
    </div>

    <div class="form-container">
      <form id="reportForm">
        <label for="fullName">Nombre completo</label>
        <input type="text" id="fullName" name="fullName">

        <label for="idNumber">Numero de identificacion</label>
        <input type="text" id="idNumber" name="idNumber">

        <label for="address">Barrio</label>
        <input type="text" id="barrio" name="barrio">

        <label for="address">Direccion</label>
        <input type="text" id="address" name="address">

        <label for="time">Hora aproximada</label>
        <input type="time" id="time" name="time">

        <label for="description">Descripcion</label>
        <textarea id="description" name="description" rows="3"></textarea>

        <button id="btn-create">Enviar Reporte</button>
      </form>
    </div>

    <script type="module" src="./src/formReport.js"></script>
  </body>

</html>
